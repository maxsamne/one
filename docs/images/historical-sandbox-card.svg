<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">The Historical Sandbox card image</title>
  <desc id="desc">An archival-style illustration of an early rocket test on a gantry with blueprint overlays and warm parchment tones.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2e8d5"/>
      <stop offset="55%" stop-color="#eadfc9"/>
      <stop offset="100%" stop-color="#e4d6bd"/>
    </linearGradient>
    <radialGradient id="stainA" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#b99f78" stop-opacity="0"/>
    </radialGradient>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5d5a56"/>
      <stop offset="40%" stop-color="#868078"/>
      <stop offset="100%" stop-color="#2b2a29"/>
    </linearGradient>
    <linearGradient id="rocketBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#807973"/>
      <stop offset="45%" stop-color="#b4aea6"/>
      <stop offset="100%" stop-color="#4d4b48"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#85745b"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#paper)"/>
  <rect width="1200" height="800" fill="url(#stainA)"/>
  <rect width="1200" height="800" filter="url(#paperNoise)" opacity="0.8"/>

