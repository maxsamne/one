<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximilian Samne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #efe2c6;
      --surface: #f6ecd7;
      --surface-soft: rgba(246, 236, 215, 0.78);
      --ink: #5d3823;
      --ink-muted: #8f6f56;
      --accent: #a46738;
      --border: #d3bc98;
      --shadow: 0 18px 40px rgba(93, 56, 35, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: linear-gradient(180deg, #f3e7cd 0%, var(--bg) 100%);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font: 400 16px/1.65 "Inter", sans-serif;
      background:
        radial-gradient(circle at top, rgba(164, 103, 56, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0));
    }

    a {
      color: inherit;
    }

    nav {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    nav .wordmark {
      color: var(--ink);
      text-decoration: none;
      font: 600 1rem/1 "Inter", sans-serif;
      letter-spacing: -0.04em;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav ul a {
      color: var(--ink-muted);
      text-decoration: none;
      font: 500 0.95rem/1 "Inter", sans-serif;
      transition: color 0.2s ease;
    }

    nav ul a:hover,
    nav ul a:focus-visible,
    .links a:hover,
    .links a:focus-visible {
      color: var(--ink);
      outline: none;
    }

    main {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 72px 24px 48px;
    }

    .hero {
      max-width: 720px;
      padding: 36px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0,
        transparent 33px,
        rgba(164, 103, 56, 0.06) 33px,
        rgba(164, 103, 56, 0.06) 34px
      );
      pointer-events: none;
      opacity: 0.5;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .label {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: rgba(234, 216, 184, 0.72);
      color: var(--ink-muted);
      font: 500 0.72rem/1.2 "JetBrains Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font: 600 clamp(3rem, 8vw, 5.5rem)/0.95 "Lora", serif;
      letter-spacing: -0.04em;
      text-wrap: balance;
    }

    .positioning {
      margin: 18px 0 0;
      max-width: 34rem;
      color: var(--ink-muted);
      font: 400 1.08rem/1.8 "Inter", sans-serif;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 28px;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font: 500 0.98rem/1.2 "Inter", sans-serif;
    }

    footer {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 24px 40px;
      color: var(--ink-muted);
      font: 400 0.82rem/1.5 "JetBrains Mono", monospace;
    }

    @media (max-width: 640px) {
      nav {
        padding: 22px 18px 0;
        flex-direction: column;
        align-items: flex-start;
      }

      main {
        padding: 52px 18px 36px;
      }

      .hero {
        padding: 26px 22px;
      }

      .links {
        flex-direction: column;
        gap: 12px;
      }

      footer {
        padding: 0 18px 28px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a class="wordmark" href="/one/">MS</a>
    <ul>
      <li><a href="/one/writing">Writing</a></li>
      <li><a href="/one/work">Work</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero" aria-labelledby="home-title">
      <div class="label">Stockholm / AI / Venture</div>
      <h1 id="home-title">Maximilian Samne</h1>
      <p class="positioning">Investor, builder, and writer exploring how AI, taste, and technology reshape the way people work, decide, and live.</p>
      <div class="links">
        <a href="/one/writing">Read writing</a>
        <a href="/one/work">View work</a>
        <a href="https://www.linkedin.com/in/maximiliansamne/" target="_blank" rel="noreferrer">LinkedIn</a>
      </div>
    </section>
  </main>

  <footer>
    <p>Quiet pages, warm paper, clear links.</p>
  </footer>
</body>
</html>
