<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximilian Samne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #efe2c6;
      --surface: #f6ecd7;
      --ink: #5d3823;
      --ink-muted: #8f6f56;
      --accent: #a46738;
      --accent-strong: #8d5428;
      --border: #d3bc98;
      --shadow: 0 18px 45px rgba(93, 56, 35, 0.08);
      --max-width: 1120px;
      --font-serif: "Lora", serif;
      --font-ui: "Inter", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 28%),
        radial-gradient(circle at bottom right, rgba(164,103,56,0.10), transparent 24%),
        linear-gradient(180deg, #f2e6cb 0%, var(--bg) 100%);
      font: 400 18px/1.72 var(--font-serif);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(93,56,35,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(93,56,35,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 82%);
      opacity: 0.4;
    }

    a { color: inherit; }

    nav {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      padding: 26px 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
    }

    nav::before {
      content: "";
      position: absolute;
      inset: 8px -12px;
      border: 1px solid rgba(163, 126, 85, 0.18);
      border-radius: 999px;
      background: rgba(246, 236, 215, 0.52);
      z-index: -1;
    }

    nav .wordmark {
      font: 700 16px/1 var(--font-ui);
      letter-spacing: 0.12em;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(234, 216, 184, 0.75);
      border: 1px solid var(--border);
      text-transform: uppercase;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 10px;
      margin: 0;
      padding: 0;
    }

    nav li a {
      text-decoration: none;
      color: var(--ink-muted);
      font: 500 12px/1 var(--font-ui);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 11px 14px;
      border-radius: 999px;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    nav li a:hover,
    nav li a:focus-visible {
      color: var(--ink);
      background: rgba(234, 216, 184, 0.8);
      outline: none;
      transform: translateY(-1px);
    }

    main {
      width: min(calc(100% - 32px), 760px);
      margin: 0 auto;
      min-height: calc(100vh - 120px);
      padding: 72px 0 96px;
      display: grid;
      align-items: center;
    }

    .home {
      padding: 40px 0;
      display: grid;
      gap: 22px;
    }

    .eyebrow,
    .links a,
    footer {
      font-family: var(--font-mono);
    }

    .eyebrow {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    h1 {
      margin: 0;
      font: 600 clamp(54px, 12vw, 92px)/0.96 var(--font-serif);
      letter-spacing: -0.03em;
    }

    .positioning {
      margin: 0;
      max-width: 34ch;
      font-size: 22px;
      line-height: 1.6;
      color: var(--ink-muted);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding-top: 6px;
    }

    .links a {
      text-decoration: none;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(164,103,56,0.45);
      transition: border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .links a:hover,
    .links a:focus-visible {
      color: var(--accent-strong);
      border-bottom-color: var(--accent-strong);
      transform: translateY(-1px);
      outline: none;
    }

    footer {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto 36px;
      color: var(--ink-muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      body { font-size: 17px; }

      nav {
        width: min(calc(100% - 24px), var(--max-width));
        padding-top: 18px;
        align-items: flex-start;
        flex-direction: column;
      }

      nav::before { inset: 0; border-radius: 28px; }
      nav ul { flex-wrap: wrap; }

      main,
      footer {
        width: min(calc(100% - 24px), 760px);
      }

      main {
        padding-top: 36px;
        min-height: auto;
      }

      h1 {
        font-size: clamp(44px, 16vw, 72px);
      }

      .positioning {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a class="wordmark" href="/one/">MS</a>
    <ul>
      <li><a href="/one/writing">Writing</a></li>
      <li><a href="/one/work">Work</a></li>
    </ul>
  </nav>

  <main>
    <section class="home" aria-label="Homepage">
      <p class="eyebrow">Maximilian Samne</p>
      <h1>Maximilian Samne</h1>
      <p class="positioning">Investor, builder, and writer working at the intersection of AI, products, and venture.</p>
      <div class="links" aria-label="Primary links">
        <a href="/one/writing">Writing</a>
        <a href="/one/work">Work</a>
        <a href="/one/design.html">Design</a>
      </div>
    </section>
  </main>

  <footer>
    <span>Atelier Ledger warmth, kept sparse.</span>
  </footer>
</body>
</html>
