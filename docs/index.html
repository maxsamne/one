<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximilian Samne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #efe2c6;
      --bg-2: #f5ead2;
      --surface: rgba(250, 243, 229, 0.82);
      --ink: #5d3823;
      --ink-soft: #73543d;
      --muted: #8f6f56;
      --accent: #a46738;
      --accent-soft: rgba(164, 103, 56, 0.12);
      --border: #d3bc98;
      --line: rgba(143, 111, 86, 0.09);
      --shadow: 0 24px 64px rgba(93, 56, 35, 0.08);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(164, 103, 56, 0.08), transparent 28%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font: 400 16px/1.75 Lora, serif;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 42px 42px;
      background-position: center top;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    nav {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    nav .wordmark {
      font: 600 18px/1 Inter, sans-serif;
      letter-spacing: -0.04em;
      color: var(--ink);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav ul a {
      color: var(--ink-soft);
      font: 500 14px/1 Inter, sans-serif;
      transition: color 0.18s ease;
    }

    nav ul a:hover,
    nav ul a:focus-visible,
    .links a:hover,
    .links a:focus-visible {
      color: var(--ink);
      outline: none;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 72px 28px 72px;
    }

    .hero {
      max-width: 720px;
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 18% 16%, rgba(164, 103, 56, 0.08), transparent 18%);
      pointer-events: none;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--muted);
      font: 500 12px/1.2 "JetBrains Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font: 600 clamp(50px, 8vw, 84px)/0.96 Lora, serif;
      letter-spacing: -0.04em;
      text-wrap: balance;
    }

    .lede {
      margin: 18px 0 0;
      max-width: 34rem;
      color: var(--ink-soft);
      font: 400 20px/1.75 Lora, serif;
      text-wrap: balance;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 28px;
    }

    .links a {
      color: var(--accent);
      font: 500 15px/1.2 Inter, sans-serif;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font: 500 12px/1.4 "JetBrains Mono", monospace;
      letter-spacing: 0.04em;
    }

    @media (max-width: 720px) {
      nav {
        padding: 20px 16px 0;
        flex-direction: column;
        align-items: flex-start;
      }

      .page {
        padding: 52px 16px 48px;
      }

      .hero {
        padding: 28px 22px;
      }

      .links {
        flex-direction: column;
        gap: 12px;
      }

      h1 {
        font-size: clamp(42px, 14vw, 62px);
      }

      .lede {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a class="wordmark" href="/one/">MS</a>
    <ul>
      <li><a href="/one/writing">Writing</a></li>
      <li><a href="/one/work">Work</a></li>
    </ul>
  </nav>

  <div class="page">
    <main class="hero">
      <p class="eyebrow">Stockholm / AI / Venture</p>
      <h1>Maximilian Samne</h1>
      <p class="lede">Investor, builder, and writer exploring how AI, taste, and technology reshape the way people work, decide, and live.</p>
      <div class="links">
        <a href="/one/writing">Read writing</a>
        <a href="/one/work">View work</a>
        <a href="https://www.linkedin.com/in/maximiliansamne/" target="_blank" rel="noreferrer">LinkedIn</a>
      </div>
    </main>

    <p class="footer-note">Quiet pages, warm paper, clear links.</p>
  </div>
</body>
</html>
