<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximilian Samne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f1;
      --surface: #eeecea;
      --ink: #1c1a18;
      --ink-muted: #7a756e;
      --accent: #2d4a3e;
      --border: #dedad4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      border-bottom: 1px solid var(--border);
    }

    nav .wordmark {
      font-family: 'Lora', serif;
      font-size: 17px;
      color: var(--ink);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
    }

    nav a {
      color: var(--ink-muted);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--ink); }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 96px 48px 120px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 36px;
      font-weight: 500;
      line-height: 1.25;
      color: var(--ink);
      margin-bottom: 24px;
    }

    .lead {
      font-size: 17px;
      color: var(--ink-muted);
      line-height: 1.7;
      max-width: 560px;
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 1px;
      transition: opacity 0.15s;
    }

    .links a:hover { opacity: 0.65; }
  </style>
</head>
<body>
  <nav>
    <a class="wordmark" href="/">MS</a>
    <ul>
      <li><a href="/one/silicon-sociology">Writing</a></li>
      <li><a href="/one/work">Work</a></li>
    </ul>
  </nav>
  <main>
    <p class="eyebrow">Maximilian Samne</p>
    <h1>Building things worth<br>paying attention to.</h1>
    <p class="lead">Investor, builder, and occasional writer. Working at the intersection of AI and venture.</p>
    <div class="links">
      <a href="/one/backtesting-the-future.html">Backtesting the Future</a>
      <a href="/one/silicon-sociology">Silicon Sociology</a>
      <a href="https://www.linkedin.com/in/maximiliansamne/" target="_blank">LinkedIn</a>
    </div>
  </main>
</body>
</html>
