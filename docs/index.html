<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximilian Samne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f2e8;
      --bg-grid: rgba(111, 84, 53, 0.08);
      --surface: rgba(252, 247, 239, 0.84);
      --surface-strong: rgba(250, 244, 234, 0.94);
      --surface-soft: rgba(255, 251, 244, 0.72);
      --ink: #211a14;
      --ink-soft: #3f3328;
      --ink-muted: #7c6857;
      --accent: #8a5a36;
      --accent-soft: rgba(138, 90, 54, 0.12);
      --border: rgba(131, 102, 72, 0.24);
      --shadow: 0 24px 70px rgba(60, 40, 18, 0.12);
      --shadow-soft: 0 14px 36px rgba(60, 40, 18, 0.08);
      --focus: rgba(138, 90, 54, 0.28);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.46), rgba(255,255,255,0)) 0 0 / 100% 100% no-repeat,
        linear-gradient(to right, var(--bg-grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--bg-grid) 1px, transparent 1px),
        var(--bg);
      background-size: 100% 100%, 72px 72px, 72px 72px, auto;
      background-attachment: fixed;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.48), rgba(255,255,255,0) 42%),
        transparent;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
    }

    a {
      color: inherit;
    }

    .page-shell {
      width: min(1160px, calc(100vw - 32px));
      margin: 16px auto;
      border: 1px solid rgba(255,255,255,0.58);
      border-radius: 30px;
      background: rgba(247, 242, 232, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(252, 247, 239, 0.72);
    }

    nav .wordmark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      height: 50px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface-strong);
      text-decoration: none;
      color: var(--ink);
      font: 500 13px/1 'JetBrains Mono', monospace;
      letter-spacing: 0.12em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.72);
    }

    nav ul {
      display: flex;
      align-items: center;
      gap: 10px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav ul a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--ink-muted);
      text-decoration: none;
      font: 500 14px/1 'Inter', sans-serif;
      transition: transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    nav ul a:hover,
    nav ul a:focus-visible {
      color: var(--ink);
      background: rgba(255, 251, 244, 0.9);
      border-color: var(--border);
      box-shadow: var(--shadow-soft);
      outline: none;
      transform: translateY(-1px);
    }

    .page-shell :focus-visible {
      box-shadow: 0 0 0 4px var(--focus);
    }

    main {
      padding: 34px 22px 22px;
    }

    .hero-card {
      max-width: 760px;
      padding: 42px;
      border: 1px solid var(--border);
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.48), rgba(255,255,255,0) 55%),
        var(--surface);
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.72);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--ink-muted);
      font: 500 12px/1.3 'JetBrains Mono', monospace;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      max-width: 11ch;
      color: var(--ink-soft);
      font: 600 clamp(3.2rem, 7.6vw, 5.4rem)/0.95 'Lora', serif;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    .lead {
      max-width: 560px;
      margin: 0 0 30px;
      color: var(--ink-muted);
      font: 400 19px/1.72 'Inter', sans-serif;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-strong);
      color: var(--ink-soft);
      text-decoration: none;
      font: 500 14px/1 'Inter', sans-serif;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.76);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
    }

    .links a:hover,
    .links a:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(138, 90, 54, 0.42);
      background: #fffaf2;
      box-shadow: 0 14px 28px rgba(60, 40, 18, 0.1), inset 0 1px 0 rgba(255,255,255,0.84);
      outline: none;
    }

    .links a:last-child {
      background: var(--ink);
      color: #f8f2ea;
      border-color: var(--ink);
      box-shadow: 0 14px 30px rgba(33, 26, 20, 0.2);
    }

    .links a:last-child:hover,
    .links a:last-child:focus-visible {
      background: #2d241c;
      border-color: #2d241c;
      box-shadow: 0 18px 34px rgba(33, 26, 20, 0.24);
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 22px 22px;
      color: var(--ink-muted);
      font: 400 12px/1.6 'JetBrains Mono', monospace;
    }

    footer a {
      color: var(--ink-muted);
      text-decoration: none;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--ink);
      text-decoration: underline;
      outline: none;
    }

    @media (max-width: 720px) {
      .page-shell {
        width: min(100vw - 16px, 1160px);
        margin: 8px auto;
        border-radius: 24px;
      }

      nav {
        padding: 16px;
      }

      nav ul {
        gap: 6px;
      }

      nav ul a {
        min-height: 38px;
        padding: 0 12px;
        font-size: 13px;
      }

      main {
        padding: 20px 16px 16px;
      }

      .hero-card {
        padding: 28px 22px;
        border-radius: 24px;
      }

      h1 {
        max-width: none;
        font-size: clamp(2.7rem, 12vw, 4rem);
      }

      .lead {
        font-size: 17px;
      }

      footer {
        flex-direction: column;
        align-items: flex-start;
        padding: 14px 16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav>
      <a class="wordmark" href="/one/">MS</a>
      <ul>
        <li><a href="/one/writing">Writing</a></li>
        <li><a href="/one/work">Work</a></li>
      </ul>
    </nav>

    <main>
      <section class="hero-card">
        <p class="eyebrow">Maximilian Samne</p>
        <h1>Building things worth paying attention to.</h1>
        <p class="lead">Investor, builder, and occasional writer. Working at the intersection of AI and venture.</p>
        <div class="links">
          <a href="/one/silicon-sociology">Silicon Sociology</a>
          <a href="https://www.linkedin.com/in/maximiliansamne/" target="_blank" rel="noreferrer">LinkedIn</a>
        </div>
      </section>
    </main>

    <footer>
      <span>Stockholm · AI · Venture</span>
      <a href="/one/silicon-sociology">Latest writing</a>
    </footer>
  </div>
</body>
</html>
